name: paymint
description: A premium, modern bill reminder app with automated recurring logic.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1

  # Firebase (Stable versions for Flutter 3.x to fix 'handleThenable' web error)
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0

  # UI & Utilities
  google_fonts: ^8.0.2
  intl: ^0.20.2
  table_calendar: ^3.0.9
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  glassmorphism_ui: ^0.3.0
  font_awesome_flutter: ^11.0.0
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
